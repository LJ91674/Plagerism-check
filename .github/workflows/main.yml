name: "Plagiarism Check"

on:
  push:  # Run this workflow whenever code is pushed

jobs:
  check-plagiarism:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Update to v4 for Node.js support

    - name: Setup Java
      uses: actions/setup-java@v3  # Use version 3 for Java
      with:
        java-version: "11"  # Ensure correct Java version is set

    - name: Install JPlag
      run: |
        mkdir results
        wget https://github.com/jplag/JPlag/releases/download/v2.11.9/jplag-2.11.9-SNAPSHOT-jar-with-dependencies.jar -O jplag.jar

    - name: Run JPlag
      run: |
        java -jar jplag.jar -l python -r ./results ./  # Replace 'python' with your language
        ls results
